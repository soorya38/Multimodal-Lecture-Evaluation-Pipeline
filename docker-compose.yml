services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lecture-eval-backend
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - PORT=8000
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_SECURE=false
      - MINIO_DEFAULT_BUCKET=lectures
    depends_on:
      - minio
    volumes:
      # Mount the current directory for live reload support during development
      - .:/app
      # Use an anonymous volume to prevent overwriting the container's virtual environment
      # with the host's local .venv directory (crucial when host is macOS/Windows and container is Linux)
      - /app/.venv
    # Run with reload enabled for a better development experience
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  minio:
    image: minio/minio:latest
    container_name: lecture-eval-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  minio_data:
