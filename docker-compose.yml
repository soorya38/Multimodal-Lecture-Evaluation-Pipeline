services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lecture-eval-backend
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - PORT=8000
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_SECURE=false
      - MINIO_DEFAULT_BUCKET=lectures
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - minio
      - ollama
    volumes:
      # Mount the current directory for live reload support during development
      - .:/app
      # Use an anonymous volume to prevent overwriting the container's virtual environment
      # with the host's local .venv directory (crucial when host is macOS/Windows and container is Linux)
      - /app/.venv
    # Run with reload enabled for a better development experience
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  minio:
    image: minio/minio:latest
    container_name: lecture-eval-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  ollama:
    image: ollama/ollama:latest
    container_name: lecture-eval-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Start the server in the background, pull the models, then bring server to foreground
    entrypoint: >
      /bin/sh -c "ollama serve & sleep 3 && ollama pull llama3.2 && ollama pull llava-phi3 && wait"

volumes:
  minio_data:
  ollama_data:
